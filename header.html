<!-- Load Font Awesome from CDN -->
<link
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
  rel="stylesheet"
/>

<style>
/* Modal background */
.img-modal {
  display: none; position: fixed; z-index: 9999; padding-top: 40px;
  left: 0; top: 0; width: 100%; height: 100%;
  overflow: auto; background-color: rgba(0,0,0,0.85);
}
.img-modal-content {
  margin: auto; display: block;
  max-width: 90%; max-height: 90%; border-radius: 6px;
}
.img-modal-close {
  position: absolute; top: 20px; right: 35px;
  color: #fff; font-size: 40px; font-weight: bold; cursor: pointer;
}
</style>

<script>
document.addEventListener("DOMContentLoaded", function() {
  const modal = document.createElement("div");
  modal.className = "img-modal";
  modal.innerHTML = `
    <span class="img-modal-close">&times;</span>
    <img class="img-modal-content" id="img-modal-img">
  `;
  document.body.appendChild(modal);

  const modalImg = document.getElementById("img-modal-img");
  const closeBtn = modal.querySelector(".img-modal-close");

  document.querySelectorAll("img.zoomable").forEach(img => {
    img.style.cursor = "zoom-in";
    img.addEventListener("click", () => {
      modal.style.display = "block";
      modalImg.src = img.src;
    });
  });

  closeBtn.onclick = () => modal.style.display = "none";
  modal.onclick = (e) => { if (e.target === modal) modal.style.display = "none"; };
});
</script>

<!-- stratum-sqlite initialisation
     Detects the page depth from Quarto's site_libs/ script so this works
     for pages at any subdirectory level without hardcoding paths. -->
<script>
(function () {
  var siteLibScript = document.querySelector('script[src*="site_libs/"]');
  var root = siteLibScript
    ? siteLibScript.getAttribute('src').replace(/site_libs\/.*$/, '')
    : '';

  window._sqljsBase = root + 'libs/sqljs/';
  window._dbPath    = root + 'pilot_vannmiljo.sqlite';

  // import() requires an absolute URL — a bare relative path like
  // "libs/sqljs/stratum-sqlite.esm.js" throws "bare specifier" error.
  // new URL() resolves the relative path against the current page URL,
  // producing a full absolute https:// URL that import() accepts.
  var esmUrl = new URL(window._sqljsBase + 'stratum-sqlite.esm.js',
                       window.location.href).href;

  window._stratumSQLite = import(esmUrl)
    .then(function (m) { return m.default; });
}());
</script>
